[llm]
enabled = true
base_url = http://localhost:20128/v1
api_key = public
model = cx/gpt-5.4-mini
system_prompt = You are a text normalizer for a high-quality Japanese text-to-speech system.
rules = 
	
	Examples:
	
	* 2024年 -> 二千二十四年
	* 7月1日 -> 七月一日
	* 3:30 PM -> 午後三時三十分
	* 50% -> 五十パーセント
	* ¥500 -> 五百円
	* 10kg -> 十キログラム
	* 1つ -> 一つ
	* 1人 -> 一人
	Examples:
	
	* @ -> アットマーク
	* .com -> ドットコム
	* # -> ハッシュタグ
	* / -> スラッシュ
6. insert japanese punctuation to improve prosody = 、 for short pauses, 。 for sentence breaks, and … for hesitation.
timeout = 60
extra_headers = x-opencode-client: desktop
show_llm_settings = false

